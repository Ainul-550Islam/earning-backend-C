version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: earnify_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - earnify_network

  celery_worker:
    build: .
    container_name: earnify_celery_worker
    command: celery -A tasks.celery:celery_app worker --loglevel=info --queues=daily,periodic,email,sms,payments,reports,withdrawals,maintenance
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://user:pass@db:5432/earnify
    depends_on:
      - redis
      - db
    volumes:
      - ./logs:/app/logs
    networks:
      - earnify_network
    restart: unless-stopped
    deploy:
      replicas: 3

  celery_beat:
    build: .
    container_name: earnify_celery_beat
    command: celery -A tasks.celery:celery_app beat --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://user:pass@db:5432/earnify
    depends_on:
      - redis
      - db
    volumes:
      - ./logs:/app/logs
    networks:
      - earnify_network
    restart: unless-stopped

  celery_flower:
    build: .
    container_name: earnify_celery_flower
    command: celery -A tasks.celery:celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - earnify_network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: earnify_db
    environment:
      - POSTGRES_DB=earnify
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - earnify_network

volumes:
  redis_data:
  postgres_data:

networks:
  earnify_network:
    driver: bridge