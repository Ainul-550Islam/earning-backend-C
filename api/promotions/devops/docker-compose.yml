version: '3.9'

services:
  db:
    image: postgres:15-alpine
    volumes: [postgres_data:/var/lib/postgresql/data]
    environment:
      POSTGRES_DB: promotions_db
      POSTGRES_USER: promotions_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promotions_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    volumes: [./:/app, static_volume:/app/staticfiles, media_volume:/app/media]
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s

  celery_worker:
    build: .
    command: celery -A config worker -l info --concurrency 4 -Q default,fraud,payouts
    volumes: [./:/app]
    env_file: .env
    depends_on: [db, redis]

  celery_beat:
    build: .
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes: [./:/app]
    env_file: .env
    depends_on: [db, redis]

  celery_flower:
    build: .
    command: celery -A config flower --port=5555 --basic_auth=admin:${FLOWER_PASSWORD}
    ports: ["5555:5555"]
    env_file: .env
    depends_on: [redis]

  nginx:
    image: nginx:alpine
    volumes:
      - ./devops/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports: ["80:80", "443:443"]
    depends_on: [web]

volumes:
  postgres_data: {}
  redis_data: {}
  static_volume: {}
  media_volume: {}
