[phases.setup]
nixPkgs = ["python312", "gcc", "libpq"]

[phases.build]
cmds = ["pip install -r requirements.txt"]

[phases.deploy]
cmds = [
  "python manage.py migrate --noinput",
  "python manage.py collectstatic --noinput"
]

[start]
cmd = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 300"
